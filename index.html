<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f6f6a" />

    <!-- Установка как приложение (PWA) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SOZO" />

    <title>SOZO · путь к свободе от созависимости</title>
    <meta
      name="description"
      content="SOZO — последовательный путь для тех, кто теряет себя в близких отношениях: понять созависимость, научиться здоровым границам и обрести свободу через доверие Богу. Община «Ковчег спасения»."
    />

    <!-- Иконка сайта (вкладка браузера, закладки) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Карточка при пересылке в мессенджерах и соцсетях (Open Graph) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SOZO · Ковчег спасения" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:title" content="SOZO · путь к свободе от созависимости" />
    <meta
      property="og:description"
      content="Понять созависимость, научиться границам и обрести свободу через доверие Богу. Община «Ковчег спасения»."
    />
    <!-- ВАЖНО: ссылки ниже должны быть ПОЛНЫМИ (с https://...).
         Если поменяете домен сайта — обновите og:url и og:image. -->
    <meta property="og:url" content="https://002-sozo.vercel.app/" />
    <meta property="og:image" content="https://002-sozo.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SOZO — путь к свободе от созависимости, община Ковчег спасения" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SOZO · путь к свободе от созависимости" />
    <meta
      name="twitter:description"
      content="Понять созависимость, научиться границам и обрести свободу через доверие Богу. Община «Ковчег спасения»."
    />
    <meta name="twitter:image" content="https://002-sozo.vercel.app/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
